<!-- src/register.html - REMADEF Fast Registration --><!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account - REMADEF</title><style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI',
            Roboto, Oxygen, Ubuntu, sans-serif;
    }

    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
    }

    .container {
        background: white;
        border-radius: 24px;
        padding: 32px 24px;
        max-width: 400px;
        width: 100%;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .logo {
        text-align: center;
        margin-bottom: 24px;
    }

    .logo h1 {
        font-size: 28px;
        font-weight: 800;
        background: linear-gradient(135deg, #667eea, #764ba2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .logo p {
        color: #888;
        font-size: 13px;
        margin-top: 4px;
    }

    .method-toggle {
        display: flex;
        background: #f0f2f5;
        border-radius: 14px;
        padding: 4px;
        margin-bottom: 20px;
    }

    .method-toggle button {
        flex: 1;
        padding: 10px;
        border: none;
        background: transparent;
        border-radius: 11px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        color: #888;
    }

    .method-toggle button.active {
        background: white;
        color: #667eea;
        box-shadow: 0 2px 12px rgba(102, 126, 234, 0.25);
    }

    .method-toggle button:active {
        transform: scale(0.96);
    }

    .field-group {
        margin-bottom: 14px;
    }

    .field-group label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #333;
        margin-bottom: 5px;
    }

    .field-group input {
        width: 100%;
        padding: 12px 14px;
        border: 2px solid #e8ecf1;
        border-radius: 12px;
        font-size: 15px;
        transition: all 0.3s ease;
        outline: none;
        background: #fafbfc;
    }

    .field-group input:focus {
        border-color: #667eea;
        background: white;
        box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    .phone-input {
        display: flex;
        align-items: center;
    }

    .phone-input .country-code {
        background: #f0f2f5;
        padding: 12px 14px;
        border: 2px solid #e8ecf1;
        border-right: none;
        border-radius: 12px 0 0 12px;
        font-weight: 600;
        color: #333;
        font-size: 14px;
    }

    .phone-input input {
        border-radius: 0 12px 12px 0;
        border-left: none;
    }

    .field-error {
        color: #dc3545;
        font-size: 12px;
        margin-top: 4px;
        min-height: 18px;
    }

    .password-wrapper {
        position: relative;
    }

    .password-wrapper input {
        padding-right: 45px;
    }

    .password-toggle {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        font-size: 18px;
        cursor: pointer;
        opacity: 0.5;
        padding: 4px;
    }

    .password-toggle:hover {
        opacity: 1;
    }

    .password-strength {
        margin-top: 6px;
        height: 4px;
        border-radius: 4px;
        background: #e8ecf1;
        overflow: hidden;
    }

    .password-strength-bar {
        height: 100%;
        width: 0%;
        border-radius: 4px;
        transition: width 0.4s ease, background 0.4s ease;
    }

    .password-strength-text {
        font-size: 12px;
        margin-top: 4px;
        min-height: 18px;
        font-weight: 500;
    }

    .password-requirements {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 6px;
        font-size: 11px;
        color: #999;
    }

    .password-requirements span {
        display: flex;
        align-items: center;
        gap: 4px;
    }

    .password-requirements .met {
        color: #28a745;
    }

    .submit-btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        border: none;
        border-radius: 14px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        margin-top: 6px;
        position: relative;
    }

    .submit-btn:active {
        transform: scale(0.97);
    }

    .submit-btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
    }

    .submit-btn .spinner {
        display: none;
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    .error-message {
        display: none;
        color: #dc3545;
        background: #f8d7da;
        border: 1px solid #f5c6cb;
        padding: 10px 14px;
        border-radius: 12px;
        margin-bottom: 14px;
        font-size: 13px;
    }

    .success-box {
        display: none;
        text-align: center;
        padding: 20px 0;
    }

    .success-box .icon {
        font-size: 56px;
        margin-bottom: 8px;
    }

    .success-box h2 {
        color: #28a745;
        font-size: 22px;
        margin-bottom: 6px;
    }

    .success-box p {
        color: #666;
        font-size: 14px;
    }

    .success-box .trainee-id {
        background: linear-gradient(135deg, #f0f2f5, #e8ecf1);
        padding: 14px;
        border-radius: 12px;
        font-weight: 800;
        color: #667eea;
        font-size: 26px;
        letter-spacing: 1px;
        margin: 12px 0;
    }

    .redirect-timer {
        color: #999;
        font-size: 13px;
        margin-top: 10px;
    }

    .login-link {
        text-align: center;
        margin-top: 16px;
        font-size: 14px;
        color: #888;
    }

    .login-link a {
        color: #667eea;
        font-weight: 600;
        text-decoration: none;
    }

    .terms {
        text-align: center;
        font-size: 11px;
        color: #bbb;
        margin-top: 16px;
    }

    .terms a {
        color: #667eea;
        text-decoration: none;
    }

    .hidden {
        display: none !important;
    }

    @media (max-width: 480px) {
        .container {
            padding: 24px 16px;
        }

        .logo h1 {
            font-size: 24px;
        }
    }
</style>

</head><body><div class="container">

    <div class="logo">
        <h1>🚀 REMADEF</h1>
        <p>Create your account</p>
    </div>

    <div id="error-message" class="error-message"></div>

    <form id="register-form" autocomplete="off">

        <div class="method-toggle">

            <button
                type="button"
                id="email-tab"
                class="active"
                onclick="switchMethod('email')">
                📧 Email
            </button>

            <button
                type="button"
                id="phone-tab"
                onclick="switchMethod('phone')">
                📱 Phone
            </button>

        </div>

        <div id="email-field" class="field-group">

            <label for="email">Email Address *</label>

            <input
                type="email"
                id="email"
                placeholder="you@example.com"
                autocomplete="email"
            />

            <div id="email-error" class="field-error"></div>

        </div>

        <div id="phone-field" class="field-group hidden">

            <label for="phone">Phone Number *</label>

            <div class="phone-input">

                <span class="country-code">+234</span>

                <input
                    type="tel"
                    id="phone"
                    placeholder="8037537614"
                    autocomplete="tel"
                />

            </div>

            <div id="phone-error" class="field-error"></div>

            <small style="color:#bbb; font-size:11px;">
                10 digits (e.g., 8037537614)
            </small>

        </div>

        <div class="field-group">

            <label for="password">Password *</label>

            <div class="password-wrapper">

                <input
                    type="password"
                    id="password"
                    placeholder="Create a strong password"
                    autocomplete="new-password"
                />

                <button
                    type="button"
                    class="password-toggle"
                    onclick="togglePassword('password')">
                    👁️
                </button>

            </div>

            <div class="password-strength">
                <div
                    class="password-strength-bar"
                    id="strength-bar">
                </div>
            </div>

            <div
                class="password-strength-text"
                id="strength-text">
            </div>

            <div class="password-requirements">

                <span id="req-length">🔴 8+ chars</span>
                <span id="req-lower">🔴 Lowercase</span>
                <span id="req-upper">🔴 Uppercase</span>
                <span id="req-number">🔴 Number</span>

            </div>

        </div>

        <div class="field-group">

            <label for="confirm-password">
                Confirm Password *
            </label>

            <div class="password-wrapper">

                <input
                    type="password"
                    id="confirm-password"
                    placeholder="Confirm your password"
                    autocomplete="new-password"
                />

                <button
                    type="button"
                    class="password-toggle"
                    onclick="togglePassword('confirm-password')">
                    👁️
                </button>

            </div>

        </div>

        <button
            type="submit"
            class="submit-btn">

            <span id="btn-text">
                🚀 Create Account
            </span>

            <div
                class="spinner"
                id="btn-spinner">
            </div>

        </button>

    </form>

    <div id="success-box" class="success-box">

        <div class="icon">🎉</div>

        <h2>Account Created!</h2>

        <p>Your Trainee ID:</p>

        <div
            class="trainee-id"
            id="trainee-id-display">
            REM-0000
        </div>

        <p style="font-size:13px; color:#888;">
            Welcome to REMADEF 🚀
        </p>

        <div class="redirect-timer">

            Redirecting to login in
            <span id="countdown">3</span>s

        </div>

    </div>

    <div class="login-link">

        Already a member?

        <a
            href="login.html">
            Login here
        </a>

    </div>

    <div class="terms">

        By continuing, you agree to our

        <a href="#">
            Terms
        </a>

        &amp;

        <a href="#">
            Privacy Policy
        </a>

    </div>

</div>

<!-- Cache-busting version ensures latest register.js is loaded -->
<script
    type="module"
    src="register.js?v=2">
</script>

</body>
</html>
