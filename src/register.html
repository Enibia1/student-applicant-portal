<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REMADEF - Create Account</title><style>
    * {
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .box {
        width: 100%;
        max-width: 400px;
        background: white;
        padding: 28px 22px;
        border-radius: 22px;
        box-shadow: 0 15px 40px #0004;
    }

    h1 {
        text-align: center;
        color: #667eea;
        margin: 0 0 5px;
    }

    .subtitle {
        text-align: center;
        color: #888;
        margin-bottom: 22px;
    }

    .tabs {
        display: flex;
        gap: 5px;
        background: #f1f3f6;
        padding: 4px;
        border-radius: 12px;
        margin-bottom: 18px;
    }

    .tabs button {
        flex: 1;
        border: 0;
        padding: 11px;
        border-radius: 9px;
        background: transparent;
        cursor: pointer;
        font-weight: bold;
    }

    .tabs .active {
        background: white;
        color: #667eea;
    }

    label {
        display: block;
        margin: 12px 0 5px;
        font-size: 13px;
        font-weight: bold;
    }

    input {
        width: 100%;
        padding: 13px;
        border: 2px solid #e5e8ed;
        border-radius: 10px;
        font-size: 15px;
        outline: none;
    }

    input:focus {
        border-color: #667eea;
    }

    .password-box {
        position: relative;
    }

    .password-box input {
        padding-right: 45px;
    }

    .password-box button {
        position: absolute;
        right: 10px;
        top: 8px;
        border: 0;
        background: transparent;
        font-size: 18px;
        cursor: pointer;
    }

    .strength {
        height: 5px;
        background: #eee;
        margin-top: 7px;
        border-radius: 5px;
    }

    #strength-bar {
        height: 100%;
        width: 0;
        border-radius: 5px;
    }

    #strength-text {
        font-size: 12px;
        margin-top: 4px;
    }

    .requirements {
        font-size: 11px;
        color: #999;
        margin: 7px 0;
    }

    .requirements span {
        margin-right: 5px;
    }

    .met {
        color: #28a745;
    }

    .submit {
        width: 100%;
        margin-top: 18px;
        padding: 14px;
        border: 0;
        border-radius: 12px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
    }

    .submit:disabled {
        opacity: .7;
    }

    .error {
        display: none;
        padding: 10px;
        margin-bottom: 12px;
        border-radius: 9px;
        background: #ffe5e5;
        color: #c00;
        font-size: 13px;
    }

    .success {
        display: none;
        text-align: center;
    }

    .trainee-id {
        margin: 15px 0;
        padding: 14px;
        background: #f1f3f6;
        color: #667eea;
        font-size: 24px;
        font-weight: bold;
        border-radius: 10px;
    }

    .login {
        text-align: center;
        margin-top: 18px;
        font-size: 14px;
    }

    .login a {
        color: #667eea;
        font-weight: bold;
    }

    .hidden {
        display: none;
    }
</style>

</head><body><div class="box"><h1>🚀 REMADEF</h1>

<div class="subtitle">
    Create your account
</div>

<div id="error" class="error"></div>

<form id="form">

    <div class="tabs">

        <button
            type="button"
            id="email-tab"
            class="active">

            📧 Email

        </button>

        <button
            type="button"
            id="phone-tab">

            📱 Phone

        </button>

    </div>

    <div id="email-box">

        <label for="email">
            Email Address
        </label>

        <input
            id="email"
            type="email"
            placeholder="you@example.com"
            autocomplete="email">

    </div>

    <div id="phone-box" class="hidden">

        <label for="phone">
            Phone Number
        </label>

        <input
            id="phone"
            type="tel"
            placeholder="8037537614"
            autocomplete="tel">

    </div>

    <label for="password">
        Password
    </label>

    <div class="password-box">

        <input
            id="password"
            type="password"
            placeholder="Create a strong password"
            autocomplete="new-password">

        <button
            type="button"
            onclick="togglePassword('password')">

            👁️

        </button>

    </div>

    <div class="strength">

        <div id="strength-bar"></div>

    </div>

    <div id="strength-text"></div>

    <div class="requirements">

        <span id="length">
            🔴 8+ chars
        </span>

        <span id="lower">
            🔴 Lowercase
        </span>

        <span id="upper">
            🔴 Uppercase
        </span>

        <span id="number">
            🔴 Number
        </span>

    </div>

    <label for="confirm">
        Confirm Password
    </label>

    <div class="password-box">

        <input
            id="confirm"
            type="password"
            placeholder="Confirm your password"
            autocomplete="new-password">

        <button
            type="button"
            onclick="togglePassword('confirm')">

            👁️

        </button>

    </div>

    <button
        id="submit"
        class="submit"
        type="submit">

        🚀 Create Account

    </button>

</form>

<div id="success" class="success">

    <h2>
        🎉 Account Created!
    </h2>

    <p>
        Your Trainee ID:
    </p>

    <div
        id="trainee-id"
        class="trainee-id">

        REM-0000

    </div>

    <p>
        Welcome to REMADEF 🚀
    </p>

    <p>

        Redirecting to login in
        <span id="countdown">
            3
        </span>s

    </p>

</div>

<div class="login">

    Already a member?

    <a href="login.html">
        Login here
    </a>

</div>

</div><script src="register.js?v=5"></script></body>
</html>
