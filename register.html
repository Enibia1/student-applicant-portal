<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Account | REMADEF</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f5f7;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            margin: 30px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        h1 {
            text-align: center;
            color: #1e293b;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 25px;
        }

        .method-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .method-button {
            flex: 1;
            padding: 12px;
            background: #f1f5f9;
            color: #334155;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .method-button.active {
            background: #006494;
            color: white;
            border-color: #006494;
        }

        .field {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #334155;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 16px;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #006494;
        }

        .phone-row {
            display: flex;
            gap: 8px;
        }

        .country-code {
            width: 38%;
        }

        .phone-number {
            width: 62%;
        }

        button[type="submit"] {
            width: 100%;
            padding: 13px;
            background: #006494;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button[type="submit"]:hover {
            background: #005078;
        }

        button[type="submit"]:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        #message {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
        }

        .login-link a {
            color: #006494;
            text-decoration: none;
            font-weight: bold;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Create Account</h1>

        <p class="subtitle">
            Choose one method to create your REMADEF account
        </p>

        <!-- Registration Method -->

        <div class="method-selector">

            <button
                type="button"
                id="emailMethod"
                class="method-button active"
            >
                📧 Email
            </button>

            <button
                type="button"
                id="phoneMethod"
                class="method-button"
            >
                📱 Phone
            </button>

        </div>

        <form id="registerForm">

            <!-- Email Registration -->

            <div
                id="emailSection"
                class="field"
            >

                <label for="email">
                    Email Address *
                </label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email address"
                >

            </div>

            <!-- Phone Registration -->

            <div
                id="phoneSection"
                class="field hidden"
            >

                <label for="phoneNumber">
                    Phone Number *
                </label>

                <div class="phone-row">

                    <select
                        id="countryCode"
                        class="country-code"
                    >

                        <option value="+234">
                            🇳🇬 +234
                        </option>

                        <option value="+1">
                            🇺🇸 +1
                        </option>

                        <option value="+44">
                            🇬🇧 +44
                        </option>

                        <option value="+27">
                            🇿🇦 +27
                        </option>

                        <option value="+91">
                            🇮🇳 +91
                        </option>

                        <option value="+971">
                            🇦🇪 +971
                        </option>

                    </select>

                    <input
                        type="tel"
                        id="phoneNumber"
                        class="phone-number"
                        placeholder="08031234567"
                    >

                </div>

            </div>

            <!-- Password -->

            <div class="field">

                <label for="password">
                    Password *
                </label>

                <input
                    type="password"
                    id="password"
                    required
                    minlength="8"
                    placeholder="Minimum 8 characters"
                >

            </div>

            <!-- Confirm Password -->

            <div class="field">

                <label for="confirmPassword">
                    Confirm Password *
                </label>

                <input
                    type="password"
                    id="confirmPassword"
                    required
                    minlength="8"
                    placeholder="Repeat your password"
                >

            </div>

            <button
                type="submit"
                id="registerButton"
            >
                Create Account
            </button>

        </form>

        <div id="message"></div>

        <div class="login-link">

            Already have an account?

            <a href="login.html">
                Login
            </a>

        </div>

    </div>

    <!-- Appwrite Browser SDK -->

    <script src="https://cdn.jsdelivr.net/npm/appwrite@17.0.0"></script>

    <!-- Registration Logic -->

    <script src="register.js"></script>

</body>
</html>
